name: Build and Release CV
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Typst
        uses: typst-community/setup-typst@v3

      - name: Build Template PDF
        run: typst compile template.typ LazyCV_Template.pdf

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        with:
          tag_name: latest
          name: Latest Template Build
          body: |
            This is the latest automated build of the CV template.
            You can download the PDF below to see the preview.
          files: LazyCV_Template.pdf
          prerelease: true
